# Event Detection Configuration

known_anomalies:
  # List of known anomaly periods to exclude from training
  # Values within the buffer time range (before and after) will be set to NaN
  - start: "2025-08-05T00:00:00+00:00"
    end: "2025-08-05T23:59:59+00:00"
  - start: "2025-12-05T00:00:00+00:00"
    end: "2025-12-05T23:59:59+00:00"

panels:
  panel_ids:
    - "1"
    - "2"

  channel_ids:
    - "0"
    - "1"
    - "2"
    - "3"
    - "4"

  instrumentation_ids:
    "1":
      "0": 1001001
      "1": 1001002
      "2": 1001003
      "3": 1001004
      "4": 1001005
    "2":
      "0": 1002001
      "1": 1002002
      "2": 1002003
      "3": 1002004
      "4": 1002005

  channel_keys:
    "0":
      - "flow_primary"
      - "flow_secondary"
      - "maintenance_flag"
    "1":
      - "temperature"
      - "orp_mv"
      - "ph"
    "2":
      - "temperature"
      - "conductivity"
    "3":
      - "temperature"
      - "turbidity"
    "4":
      - "temperature"
      - "sac"

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  models_dir: "data/models"
  results_dir: "data/results"
  evaluations_dir: "data/evaluations"
  credentials_file: ".env"
  raw_data_version: null

fetch:
  start_date: "2025-07-01T13:00:00+00:00"
  end_date: null
  token_request_url: "https://api.example.invalid/oauth/token"
  api_request_url: "https://api.example.invalid/v1/"

process:
  resample:
    freq: "5min"
    origin: "start_day"
    label: "right"
    closed: "right"
  maintenance_column: "channel_0_maintenance_flag"
  imputation:
    method: "linear_interpolation"
    params: {}
    add_weights: true
    weight_suffix: "__weight"
  manual_outliers:
    enabled: true
    panels:
      "1":
        columns:
          channel_3_turbidity:
            lower: 0.01
            upper: 10
          channel_1_ph:
            lower: 7
            upper: 8.5
          channel_1_orp_mv:
            lower: 200
            upper: 500
          channel_2_conductivity:
            lower: 300
            upper: 600
          channel_4_sac:
            lower: 0.1
            upper: 3
          channel_1_temperature:
            lower: 1
            upper: 25
          channel_0_flow_primary:
            lower: 0.5
            upper: 100
          channel_0_flow_secondary:
            lower: 10
            upper: 200
      "2":
        columns:
          channel_3_turbidity:
            lower: 0.01
            upper: 10
          channel_1_ph:
            lower: 7
            upper: 8.5
          channel_1_orp_mv:
            lower: 200
            upper: 500
          channel_2_conductivity:
            lower: 300
            upper: 600
          channel_4_sac:
            lower: 0.1
            upper: 3
          channel_1_temperature:
            lower: 1
            upper: 25
          flow_primary:
            lower: 0.5
            upper: 100
          flow_secondary:
            lower: 10
            upper: 200
  flow_columns_pattern: "flow"
  temperature_columns_pattern: "temperature"
  median_filter_kernel: 3

train:
  train_ratio: 0.9
  random_seed: 42
  fallback_model: "LightGBM"  # used when no per-channel/per-panel model is set in channel_config_files
  lags: 6  # Number of autoregressive lags for ForecasterRecursive
  exclude_imputed_training_samples: true
  # Predict Δy = y[t] - y[t-1] instead of y[t]; integrate one-step at
  # detection time as y_pred[t] = y[t-1] + Δy_pred[t]. Removes the
  # "predict the training mean" trivial-minimum that kept letting
  # degenerate tree configs win the tuner. Set 0 to disable.
  differentiation: 1
  exog_columns:
    - weather_snow_depth
  known_anomaly_buffer: "1d"
  # Optional: panel-specific YAMLs with per-channel model and parameter selection
  # Each file can define:
  # default: {model: LightGBM|XGBoost|Ridge, params: {...}}
  # channels:
  #   channel_1_ph: {model: Ridge, params: {alpha: 1.0}}
  channel_config_files:
    "1": "config/channel_models/panel_1_default.yaml"
    "2": "config/channel_models/panel_2_default.yaml"

detect:
  hist_window: 2016
  target_date: null
  high_quantile: 0.995
  fail_on_nan_inputs: true
  # Default chosen from the scorer benchmark (docs/scorer_benchmark.md):
  # NormScorer with ord=4 was the highest-PR-AUC scorer across 5 seeds and
  # is two orders of magnitude faster to fit than the clustering scorers.
  # Switch to "KMeansScorer", "IsolationForestScorer", or "GMMScorer" if you
  # want a different scoring style — the params block below carries
  # per-scorer kwargs and pipeline.py whitelists them per scorer.
  scorer_name: "NormScorer"
  scorer_params:
    # NormScorer
    ord: 4
    # KMeansScorer params (used when scorer_name is KMeansScorer)
    window: 1
    n_clusters: 3
    auto_select_k: true
    k_min: 2
    k_max: 10
    elbow_method: "silhouette"  # "second_derivative", "silhouette", "kneedle"
    n_init: 10
    max_iter: 300
    component_wise: false
    # IsolationForest params (used when scorer_name is IsolationForestScorer)
    # — note: tuning consistently picks contamination ≈ 0.001 across seeds;
    # the production default below mirrors that finding.
    contamination: 0.001
    n_estimators: 1000
    max_samples: "auto"
    random_state: 42
    # GMMScorer params (used when scorer_name is GMMScorer)
    # n_components: 3
    # covariance_type: "full"
    # selection_criterion: "bic"
  normalize_scores: true
  normalization_quantile: 0.99
  # --- Per-channel anomaly detection ---
  # Complements the combined scorer by flagging individual channels that
  # exceed their own quantile threshold.  The combined detector catches
  # coordinated multi-channel shifts; the per-channel detector isolates
  # strong single-channel spikes.
  per_channel:
    enabled: true
    # Quantile applied independently to each channel's |residual| distribution.
    # Stricter than the combined quantile because per-channel scoring is more
    # sensitive (fewer dimensions to dilute signal).  With ~8 channels a 0.99
    # quantile would fire on at least one channel ~8% of the time by chance;
    # 0.995 brings that down to ~4%.
    high_quantile: 0.995
    # Minimum number of channels that must individually exceed their threshold
    # for the timestamp to be flagged as a per-channel anomaly.
    # 1 = any single strong channel triggers.
    # 2+ = requires multiple independent channels to be anomalous (stricter).
    min_channels: 1
    # Optional per-panel, per-channel quantile overrides.
    # Channels without an override use high_quantile.
    # quantile_overrides:
    #   "1":
    #     channel_1_orp_mv: 0.9997
    #     channel_3_turbidity: 0.999

evaluate:
  results_timestamp: null
  include_maintenance: true
  synthetic:
    enabled: false
    n_point: 12
    n_contextual: 8
    n_collective: 4
    random_seed: 42
    # Where to inject anomalies. "series" (default) injects pre-forecast on
    # the test split — realistic, exposes which anomaly types survive
    # forecaster smoothing. "residuals" injects directly on residuals as a
    # diagnostic that isolates scorer behavior from forecaster behavior.
    target: "series"
    # Magnitudes (in column-std units). Tightened from the module defaults
    # (8 / 4 / 3) so tuning has signal to optimise against — at the module
    # defaults all strong scorers saturate at PR-AUC ≈ 1.0 and tuning is
    # indistinguishable from noise. At these values KMeans/Norm/GMM land
    # mid-0.9s, IsolationForest mid-0.7s, leaving a couple of PR-AUC
    # points for the optimiser to work with.
    point_sigma: 2.5
    contextual_sigma: 1.5
    collective_sigma: 0.9
    contextual_window: 24
    collective_length: 12
    # Sweep prevalence to defuse class-imbalance distortion of the metrics.
    prevalence_levels: [0.005, 0.01, 0.05]

# Scorer benchmarking & tuning (research/, not used by detect/live).
# Each search_space entry follows the spotoptim convention: 2-tuple
# [low, high] for numeric, 3-tuple [low, high, "log10"] for log-scale,
# list of strings for categorical factors.
benchmark:
  n_trials: 30
  n_initial: 8
  random_state: 42
  # Pinned operating threshold across every scorer to neutralise the
  # IsolationForest auto-quantile bump (which only fires when high_quantile
  # equals exactly 0.99).
  pinned_high_quantile: 0.995
  search_spaces:
    KMeansScorer:
      n_clusters: [2, 12]
    NormScorer:
      ord: [1, 4]
    IsolationForestScorer:
      n_estimators: [50, 500]
      contamination: [0.001, 0.05, "log10"]
      max_samples: [64, 512]
    GMMScorer:
      n_components: [1, 8]
      covariance_type: ["full", "tied", "diag", "spherical"]
      selection_criterion: ["fixed", "bic", "aic"]
  # Defaults used when --no-tune is passed. NormScorer.ord=4 mirrors the
  # tuning finding (every seed picked it). IsolationForest.contamination=0.001
  # mirrors the same — the sklearn default of 0.01 is too aggressive for
  # this regime.
  defaults:
    KMeansScorer:
      n_clusters: 3
      auto_select_k: false
    NormScorer:
      ord: 4
    IsolationForestScorer:
      n_estimators: 100
      contamination: 0.001
      random_state: 42
    GMMScorer:
      n_components: 3
      covariance_type: "full"
      selection_criterion: "fixed"

primary:
  display_name: "Primary"

exogenous:
  - name: "a"
    fetcher: "spotanomaly2.domain.exogenous.source_a:ExogenousAFetcher"
    joiner: "spotanomaly2.domain.exogenous.source_a:ExogenousAJoiner"
    config:
      enabled: true
      cache_dir: "data/exogenous"
      display_name: "Source A"
      panel_sources:
        "1":
          - "source_a"
        "2":
          - "source_b"
  - name: "weather"
    fetcher: "spotanomaly2.domain.exogenous.weather:ExogenousWeatherFetcher"
    joiner: "spotanomaly2.domain.exogenous.weather:ExogenousWeatherJoiner"
    config:
      enabled: true
      latitude: 0.0
      longitude: 0.0
      place: "Anonymous Location"
      use_forecast: true
      fallback_on_failure: true
      lookback_days: 14
      cache_path: "data/weather/weather_cache.parquet"
      feature_columns:
        - snow_depth

# Weight anomaly residuals by an exogenous flow column.
# Disabled by default so the repo works without exogenous data.
residual_weighting:
  enabled: false

tune:
  n_trials: 10
  n_initial: 5
  # R² compares against the constant-mean baseline (=0). Avoids the
  # trivial-mean tuning minimum that MAE/MSE fall into for narrow-range
  # targets (e.g. pH, turbidity). Higher is better; the adapter negates
  # internally so SpotOptim's minimiser still works.
  metric: "r2"
  output_dir: "data/tuning_results"
  lags:
    - "[1, 2, 3, 11, 12, 22, 23, 24, 47, 48, 167, 168]"
    - "48"
    - "24"
    - "[1, 2, 24, 48]"
    - "[1, 2, 23, 24, 47, 48]"
    - "[1, 2, 11, 12, 23, 24, 167, 168]"
  models:
    LightGBM:
      num_leaves: [8, 256]
      max_depth: [3, 16]
      learning_rate: [0.0001, 0.1, "log10"]
      n_estimators: [10, 1000, "log10"]
      bagging_fraction: [0.5, 1.0]
      feature_fraction: [0.5, 1.0]
      reg_alpha: [0.01, 100.0]
      reg_lambda: [0.01, 100.0]
    XGBoost:
      max_depth: [3, 16]
      learning_rate: [0.0001, 0.1, "log10"]
      n_estimators: [10, 1000, "log10"]
      reg_alpha: [0.01, 100.0]
      reg_lambda: [0.01, 100.0]
    CatBoost:
      max_depth: [3, 16]
      learning_rate: [0.0001, 0.1, "log10"]
      n_estimators: [10, 1000, "log10"]
      reg_lambda: [0.01, 100.0]
    Ridge:
      alpha: [0.01, 100.0, "log10"]
    ElasticNet:
      alpha: [0.0001, 10.0, "log10"]
      l1_ratio: [0.05, 0.95]
    Lasso:
      alpha: [0.0001, 10.0, "log10"]
    BayesianRidge:
      alpha_1: [0.0000001, 0.001, "log10"]
      alpha_2: [0.0000001, 0.001, "log10"]
      lambda_1: [0.0000001, 0.001, "log10"]
      lambda_2: [0.0000001, 0.001, "log10"]
    Huber:
      alpha: [0.00001, 0.1, "log10"]
      epsilon: [1.1, 3.5]
    # Nyström(rbf) + Ridge — RBF kernel approximation that scales to the
    # full dataset (replaces exact KernelRidge, which had to be capped).
    KernelRidgeApprox:
      n_components: [256, 2048]
      alpha: [0.001, 10.0, "log10"]
      gamma: [0.0001, 1.0, "log10"]
    # Nyström(rbf) + LinearSVR — RBF kernel approximation of SVR that
    # scales to the full dataset.
    SVRApprox:
      n_components: [256, 2048]
      C: [0.01, 100.0, "log10"]
      gamma: [0.0001, 1.0, "log10"]
      epsilon: [0.001, 1.0, "log10"]
    MLP:
      alpha: [0.00001, 0.1, "log10"]
      learning_rate_init: [0.0001, 0.01, "log10"]
  # Per-panel, per-channel overrides (optional)
  # panel_overrides:
  #   "1":
  #     default:
  #       n_trials: 15
  #     channels:
  #       channel_1_ph:
  #         n_trials: 20
  #         search_space:
  #           learning_rate: [0.001, 0.05, "log10"]

report:
  enabled: true
  lookback_days: 14
  output_filename: "report.html"
  refresh_interval: 30
