name: spotanomaly2 – lint & compliance

on:
  push:
    paths:
      - "spotanomaly2/**"
      - "tests/**"
      - "notebooks/**"
      - "example_live.py"
      - "pyproject.toml"
      - "uv.lock"
      - "REUSE.toml"
      - "LICENSES/**"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "spotanomaly2/**"
      - "tests/**"
      - "notebooks/**"
      - "example_live.py"
      - "pyproject.toml"
      - "uv.lock"
      - "REUSE.toml"
      - "LICENSES/**"
      - ".github/workflows/lint.yml"

jobs:
  lint:
    name: ruff · ty · reuse
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --all-groups

      - name: ruff – lint
        run: uv run ruff check .

      - name: ruff – format check
        run: uv run ruff format --check .

      - name: ty – type check
        run: uv run ty check .

      - name: reuse – license compliance
        run: uv run reuse lint
